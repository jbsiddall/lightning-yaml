# Lightning YAML — MEMORY benchmark suite (isolated child processes).
#
# Append-only, multi-document YAML (same model as speed.yaml): each '---'
# document is one full RUN; CI appends, never rewrites.
#
#   peak_rss    — whole-process peak resident set, MB (process.resourceUsage().maxRSS)
#   heap_delta  — per-run V8 heap allocation delta, KB (v8.getHeapStatistics(); may be negative)
#
# Both: lower is better. Fixed at 25 iterations (BENCH_ITERS) for comparability.
---

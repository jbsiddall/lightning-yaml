# Lightning YAML — SPEED benchmark suite (mitata, per-iteration wall time).
#
# Append-only, multi-document YAML. Each '---' document is one full RUN: a
# snapshot of every workload at a point in time. A CI job APPENDS a new document
# (it never rewrites earlier ones), so runs accumulate as history with no
# read-modify-write and no merge conflicts. The site parses every document and
# renders the newest by default; older documents power trend charts.
#
# Canonical unit: nanoseconds per iteration (ns/iter). Lower is better.

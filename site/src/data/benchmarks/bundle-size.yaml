# Lightning YAML — BUNDLE-SIZE benchmark suite (browser, minified + compressed).
#
# Append-only, multi-document YAML (same model as speed.yaml): each '---'
# document is one full RUN; CI appends, never rewrites. A run measures every
# library x bundler pair; rows are keyed by bundler, each row's `values` by
# library id (mirrors speed.yaml/memory.yaml's row/values convention).
#
# min/gzip/brotli are bytes of the production bundle after tree-shaking +
# minification, importing only parse + stringify. rust marks bundlers written
# in Rust (a property of the bundler, not the library). Lower is better.
#
# schema_version pins the doc shape for validation (bench/schemas.ts). This suite
# already versions every library under `libraries`. Emitted runs additionally
# record `generated_at` (a full ISO-8601 timestamp beside the date-only
# `generated`) — omitted here so no fabricated time ships with the sample.
---
suite: bundle-size
scope: competition
tool: vite, webpack, rolldown, bun
units:
  min: bytes
  gzip: bytes
  brotli: bytes
lower_is_better: true
schema_version: 1
generated: 2026-07-15
source: d77ba23
env:
  bundlers:
    vite: 8.1.4
    webpack: 5.108.4
    rolldown: 1.1.5
    bun: 1.3.11
libraries:
  - id: lightning-yaml
    label: Lightning YAML
    self: true
    version: 0.1.0
  - id: yaml
    label: yaml (eemeli)
    version: 2.9.0
  - id: js-yaml
    label: js-yaml
    version: 5.2.1

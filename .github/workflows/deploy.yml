name: Deploy docs

# Visible, auditable deploys via the Vercel CLI (NOT Vercel's git auto-deploy —
# disable that in the Vercel project so production only ships through this workflow).
# Production runs after the Benchmarks workflow (chained via `workflow_run` below, so
# prod builds off freshly-appended benchmark data); preview deploys on pull requests.
#
# The docs site is the nested, self-contained pnpm project in `site/`. The Vercel
# project's "Root Directory" must be set to `site` so `vercel build`/`deploy` operate
# there. Benchmark data lives on the orphan `benchmark-data` branch and is overlaid
# into `site/src/data/benchmarks/` BEFORE building (the benchmarks page + TypeDoc are
# consumed during `astro build`, which `vercel build` invokes).
#
# Auth: VERCEL_API_KEY as a repo SECRET (the Vercel token). VERCEL_ORG_ID and
# VERCEL_PROJECT_ID as repo VARIABLES (plain identifiers — not sensitive), read from
# the `vars` context below. (Store them as secrets instead? then switch these to
# `secrets.` — the two contexts are separate and don't fall through to each other.)

on:
  pull_request:
  # Chained after Benchmarks: it appends fresh data to `benchmark-data` on push to
  # `main`, then this fires on its completion so production always builds off the
  # newest data. `types: [completed]` (not gated on conclusion) means a flaky
  # benchmark still deploys the code off the last-good data.
  workflow_run:
    workflows: [Benchmarks]
    types: [completed]
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

# Cancel superseded preview builds, but never interrupt a production deploy on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default-deny: the deploy job re-grants exactly what it needs below. A fork PR
# runs build-check with only read access and no secrets.
permissions: {}

jobs:
  # Fast headless sanity build — fails CI before the Vercel steps if the site is broken.
  build-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4 # site code (main / PR branch)
      - uses: actions/checkout@v4 # benchmark data (orphan branch)
        with:
          ref: benchmark-data
          path: .benchmark-data
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - run: pnpm --dir site install --frozen-lockfile
      - name: Overlay real benchmark data over the committed sample
        run: cp .benchmark-data/*.yaml site/src/data/benchmarks/ 2>/dev/null || true
      - name: Build (astro build → starlight-typedoc → static dist)
        run: pnpm --dir site build
      - name: Assert static output exists
        run: test -f site/dist/index.html && test -d site/dist/api

  deploy:
    needs: build-check
    runs-on: ubuntu-latest
    # pull-requests: write lets the job post the preview link back onto the PR.
    # (Overrides the default read-only GITHUB_TOKEN, so contents: read is restated
    # for checkout. Fork PRs get a read-only token and skip the comment gracefully.)
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          ref: benchmark-data
          path: .benchmark-data
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - run: pnpm --dir site install --frozen-lockfile
      # The overlay MUST run before `vercel build`, because starlight-typedoc and the
      # benchmarks page consume files during the Astro build that `vercel build` invokes.
      - name: Overlay real benchmark data before building
        run: cp .benchmark-data/*.yaml site/src/data/benchmarks/ 2>/dev/null || true
      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ github.event_name == 'workflow_run' && 'production' || 'preview' }} --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_API_KEY }}
      - name: Build with Vercel (uses project Root Directory = site)
        run: vercel build ${{ github.event_name == 'workflow_run' && '--prod' || '' }} --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_API_KEY }}
      - name: Deploy prebuilt output
        id: deploy
        # vercel deploy prints the deployment URL to stdout (progress goes to stderr);
        # capture the last line as the URL and expose it as a step output.
        run: |
          url="$(vercel deploy --prebuilt ${{ github.event_name == 'workflow_run' && '--prod' || '' }} --token=$VERCEL_TOKEN | tail -n1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"
          echo "### ⚡ Deployed to $url" >> "$GITHUB_STEP_SUMMARY"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_API_KEY }}

      # Post (or update) a sticky comment on the PR with a clickable preview link.
      # Only on pull_request events (main pushes are production, no PR to comment on).
      # Uses the first-party github-script action so the logic stays auditable in-repo.
      - name: Comment the preview link on the PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const marker = '<!-- lightning-yaml-preview -->';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              marker,
              '### ⚡ Docs preview deployed',
              '',
              `**▶ Open the preview:** ${url}`,
              '',
              `<sub>Commit \`${sha}\` · redeploys on every push to this PR · via \`.github/workflows/deploy.yml\`</sub>`,
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

name: Pages (fallback)

# OPTIONAL GitHub Pages deploy — Vercel (deploy.yml) is primary. Manual trigger only.
# For a project page served at https://<user>.github.io/<repo>/, the build needs a base
# path: this workflow sets PAGES_BASE, which astro.config.mjs reads to set `base`/`site`.
# (Enable Pages → Source: GitHub Actions in repo settings before first run.)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          ref: benchmark-data
          path: .benchmark-data
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - run: pnpm --dir site install --frozen-lockfile
      - name: Overlay real benchmark data
        run: cp .benchmark-data/*.yaml site/src/data/benchmarks/ 2>/dev/null || true
      - name: Build (with Pages base path)
        run: pnpm --dir site build
        env:
          PAGES_BASE: /${{ github.event.repository.name }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

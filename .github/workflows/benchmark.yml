name: Benchmarks

# Runs the full competition matrix (every parser, one machine) on each push to
# `main` and APPENDS the results as new documents to the append-only orphan
# `benchmark-data` branch, which the docs site reads. Chained to the deploy
# workflow via `workflow_run` (see deploy.yml) so production only rebuilds AFTER
# fresh data has landed.
#
# Only the full competition matrix is published: cross-library ratios are only
# valid when every library is measured in the same run on the same machine, so
# `bench:self` (ours-only) output is never appended here.
#
# Shared GitHub runners are noisy, so absolute timings drift run-to-run — the
# site renders speed as ratios (fastest-in-row) to stay machine-invariant. Do
# not "fix" the noise by pinning runners; the ratio display already handles it.

on:
  push:
    branches: [main]

# Serialize appends so two runs never race the orphan-branch push, and never
# cancel a run mid-append.
concurrency:
  group: benchmark-data-append
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  benchmark:
    # Only the canonical repo publishes data — forks have no write access anyway.
    if: github.repository == 'jbsiddall/lightning-yaml'
    runs-on: ubuntu-latest
    env:
      BENCH_SOURCE: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      # fetch-depth: 0 so the append commit can rebase onto concurrent updates.
      - uses: actions/checkout@v4
        with:
          ref: benchmark-data
          path: .benchmark-data
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      # Bench on a current V8: node 20's older V8 understates js-yaml by ~3×,
      # inflating our published ratios vs. what modern runtimes/browsers show
      # (issues #83, #107 — the latter tracks a full runtime matrix).
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Generate benchmark fixtures
        run: pnpm gen:fixtures

      # Each producer is its own step under `if: ${{ !cancelled() }}` so a transient in
      # one (the bundler-toolchain install, or the suite fetch) can't discard the data
      # the others already wrote — the Append step then publishes whatever exists.
      - name: Speed + memory (full competition matrix)
        if: ${{ !cancelled() }}
        run: pnpm bench:competition   # -> results/benchmarks/{speed,memory}.yaml (scope competition)

      # Browser legs: same speed suite, run inside a real browser instead of
      # Node (bench/browser/). This runner has no pre-fetched cache (that's a
      # local-dev-only path — see bench/browser/engines.ts), so install both
      # engines via playwright-core's own installer first; the harness then
      # resolves them through playwright-core's standard PLAYWRIGHT_BROWSERS_PATH
      # lookup (no executablePath override needed here, unlike the local cache path).
      - name: Install Playwright browsers
        if: ${{ !cancelled() }}
        run: pnpm exec playwright-core install --with-deps chromium webkit
      - name: Browser speed (chromium)
        if: ${{ !cancelled() }}
        run: pnpm bench:browser chromium   # -> results/benchmarks/browser-speed-chromium.yaml
      - name: Browser speed (webkit)
        if: ${{ !cancelled() }}
        run: pnpm bench:browser webkit     # -> results/benchmarks/browser-speed-webkit.yaml

      # Browser memory RATIOS (issue #107 Phase 3) — same two engines, a
      # different metric: in-page retained-heap delta for chromium, kernel
      # peak-RSS of the WebKitWebProcess child for webkit (bench/browser/memory/).
      # Ratios only, never absolute bytes — see bench/schemas.ts's
      # MemoryRatiosDocSchema doc comment for why the two methods aren't
      # directly comparable. webkit's leg needs ptrace-equivalent access to
      # its own child process's /proc entries for the peak-RSS reset/read
      # (bench/browser/memory/proc.ts) — the default `ubuntu-latest` runner
      # permits that for a same-user child, same as any other process reading
      # its own descendants' /proc files.
      - name: Browser memory ratios (chromium)
        if: ${{ !cancelled() }}
        run: pnpm bench:browser:memory chromium   # -> results/benchmarks/memory-ratios-chromium.yaml
      - name: Browser memory ratios (webkit)
        if: ${{ !cancelled() }}
        run: pnpm bench:browser:memory webkit     # -> results/benchmarks/memory-ratios-webkit.yaml

      - name: Conformance (yaml-test-suite)
        if: ${{ !cancelled() }}
        run: pnpm test:suite          # runs gen:suite itself -> results/benchmarks/conformance.yaml
      - name: Bundle size
        if: ${{ !cancelled() }}
        run: pnpm bench:bundlesize    # -> results/benchmarks/bundle-size.yaml

      # Catch a malformed emitter run before it pollutes the append-only branch.
      # validate.ts skips any suite this run didn't produce (best-effort, like the
      # producers above), so a partial run still validates whatever it wrote.
      - name: Validate emitted benchmark YAML
        if: ${{ !cancelled() }}
        run: node --import tsx bench/validate.ts results/benchmarks/*.yaml

      - name: Append each produced run as a new document on benchmark-data
        if: ${{ !cancelled() }}
        working-directory: .benchmark-data
        run: |
          git config user.name  "lightning-yaml-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          append_doc() { # $1 = dest suite file (e.g. speed.yaml), $2 = source path, $3 = label for logging
            local dest="$1" src="$2" label="$3"
            if [ ! -f "$src" ]; then echo "missing $src — skipping $label"; return 0; fi
            # dest may not exist on the branch yet — seed a header on first run.
            if [ ! -f "$dest" ]; then
              printf '# %s benchmark — append-only stream, one document per CI run.\n' "${dest%.yaml}" > "$dest"
            fi
            { echo '---'; cat "$src"; } >> "$dest"
          }

          for s in speed memory conformance bundle-size; do
            append_doc "$s.yaml" "../results/benchmarks/$s.yaml" "$s"
          done
          # The browser legs are additional `suite: speed` documents (one per
          # engine) — they append onto the SAME speed.yaml stream as the Node
          # run, not a separate file, so the site's runtime picker
          # (env.runtime, site/src/lib/queries.ts) can tell the runs apart.
          for engine in chromium webkit; do
            append_doc "speed.yaml" "../results/benchmarks/browser-speed-$engine.yaml" "browser-speed-$engine"
          done
          # Same pattern for the memory-ratios legs: chromium and webkit each
          # produce their own `suite: memory-ratios` document, both appended
          # onto one shared memory-ratios.yaml stream (never memory.yaml —
          # that stream is absolute MB/KB, this one is unitless ratios; see
          # bench/schemas.ts's MemoryRatiosDocSchema doc comment).
          for engine in chromium webkit; do
            append_doc "memory-ratios.yaml" "../results/benchmarks/memory-ratios-$engine.yaml" "memory-ratios-$engine"
          done

          git add -A
          # No-op guard: nothing changed (e.g. every source missing) → succeed quietly.
          git diff --cached --quiet && { echo "nothing to append"; exit 0; }
          git commit -m "bench: run for ${GITHUB_SHA::7} [skip ci]"

      - name: Push to benchmark-data (retry + rebase on races)
        if: ${{ !cancelled() }}
        working-directory: .benchmark-data
        run: |
          for i in 1 2 3 4 5; do
            if git push origin HEAD:benchmark-data; then exit 0; fi
            git fetch origin benchmark-data && git rebase origin/benchmark-data || git rebase --abort
            sleep $((i * 3))
          done
          echo "push to benchmark-data failed after retries" >&2
          exit 1

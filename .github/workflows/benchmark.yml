name: Benchmarks

# Runs the full competition matrix (every parser, one machine) on each push to
# `main` and APPENDS the results as new documents to the append-only orphan
# `benchmark-data` branch, which the docs site reads. Chained to the deploy
# workflow via `workflow_run` (see deploy.yml) so production only rebuilds AFTER
# fresh data has landed.
#
# Only the full competition matrix is published: cross-library ratios are only
# valid when every library is measured in the same run on the same machine, so
# `bench:self` (ours-only) output is never appended here.
#
# Shared GitHub runners are noisy, so absolute timings drift run-to-run — the
# site renders speed as ratios (fastest-in-row) to stay machine-invariant. Do
# not "fix" the noise by pinning runners; the ratio display already handles it.

on:
  push:
    branches: [main]

# Serialize appends so two runs never race the orphan-branch push, and never
# cancel a run mid-append.
concurrency:
  group: benchmark-data-append
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  benchmark:
    # Only the canonical repo publishes data — forks have no write access anyway.
    if: github.repository == 'jbsiddall/lightning-yaml'
    runs-on: ubuntu-latest
    env:
      BENCH_SOURCE: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      # fetch-depth: 0 so the append commit can rebase onto concurrent updates.
      - uses: actions/checkout@v4
        with:
          ref: benchmark-data
          path: .benchmark-data
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Generate benchmark fixtures
        run: pnpm gen:fixtures

      # Each producer is its own step under `if: ${{ !cancelled() }}` so a transient in
      # one (the bundler-toolchain install, or the suite fetch) can't discard the data
      # the others already wrote — the Append step then publishes whatever exists.
      - name: Speed + memory (full competition matrix)
        if: ${{ !cancelled() }}
        run: pnpm bench:competition   # -> results/benchmarks/{speed,memory}.yaml (scope competition)
      - name: Conformance (yaml-test-suite)
        if: ${{ !cancelled() }}
        run: pnpm test:suite          # runs gen:suite itself -> results/benchmarks/conformance.yaml
      - name: Bundle size
        if: ${{ !cancelled() }}
        run: pnpm bench:bundlesize    # -> results/benchmarks/bundle-size.yaml

      # Catch a malformed emitter run before it pollutes the append-only branch.
      # validate.ts skips any suite this run didn't produce (best-effort, like the
      # producers above), so a partial run still validates whatever it wrote.
      - name: Validate emitted benchmark YAML
        if: ${{ !cancelled() }}
        run: node --import tsx bench/validate.ts results/benchmarks/*.yaml

      - name: Append each produced run as a new document on benchmark-data
        if: ${{ !cancelled() }}
        working-directory: .benchmark-data
        run: |
          git config user.name  "lightning-yaml-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for s in speed memory conformance bundle-size; do
            src="../results/benchmarks/$s.yaml"
            if [ ! -f "$src" ]; then echo "missing $src — skipping $s"; continue; fi
            # bundle-size.yaml may not exist on the branch yet — seed a header on first run.
            if [ ! -f "$s.yaml" ]; then
              printf '# %s benchmark — append-only stream, one document per CI run.\n' "$s" > "$s.yaml"
            fi
            { echo '---'; cat "$src"; } >> "$s.yaml"
          done
          git add -A
          # No-op guard: nothing changed (e.g. every source missing) → succeed quietly.
          git diff --cached --quiet && { echo "nothing to append"; exit 0; }
          git commit -m "bench: run for ${GITHUB_SHA::7} [skip ci]"

      # Re-validate the WHOLE updated streams (all history + the just-appended
      # doc) before the push, so a corrupt append can never reach the shared
      # branch. Run from repo root (not .benchmark-data) so tsx/zod/yaml resolve
      # from the root install.
      - name: Validate full benchmark-data streams
        if: ${{ !cancelled() }}
        run: node --import tsx bench/validate.ts .benchmark-data/speed.yaml .benchmark-data/memory.yaml .benchmark-data/conformance.yaml .benchmark-data/bundle-size.yaml

      - name: Push to benchmark-data (retry + rebase on races)
        if: ${{ !cancelled() }}
        working-directory: .benchmark-data
        run: |
          for i in 1 2 3 4 5; do
            if git push origin HEAD:benchmark-data; then exit 0; fi
            git fetch origin benchmark-data && git rebase origin/benchmark-data || git rebase --abort
            sleep $((i * 3))
          done
          echo "push to benchmark-data failed after retries" >&2
          exit 1

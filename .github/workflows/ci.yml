name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Every PR — including from strangers once this repo is public — runs this
# workflow, so keep the token to the minimum both jobs need: read-only checkout.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the `packageManager` field (pnpm@10.33.0) from package.json —
      # do not pin a version here, it would fight that field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (vitest consistency suite vs. oracle)
        run: pnpm test

      - name: Test (parser unit suite)
        run: pnpm test:unit

      - name: Test (stringify round-trip suite)
        run: pnpm test:stringify

      - name: Build
        run: pnpm build

      - name: Smoke test built dist (ESM + CJS + compat subpaths)
        run: |
          set -eu

          cat > ./.smoke-test.mjs <<'EOF'
          import { existsSync, statSync } from 'node:fs';
          import { parse, stringify } from './dist/index.js';
          import { parse as yamlCompatParse } from './dist/yaml-compat.js';
          import { load as jsYamlLoad } from './dist/js-yaml-compat.js';

          // Main ESM entry.
          const esmParsed = parse('a: 1');
          if (esmParsed.a !== 1) {
            throw new Error('ESM parse() failed: ' + JSON.stringify(esmParsed));
          }
          if (typeof stringify({ a: 1 }) !== 'string') {
            throw new Error('ESM stringify() did not return a string');
          }

          // `lightning-yaml/yaml` compat subpath (ESM).
          const yamlCompatParsed = yamlCompatParse('a: 1');
          if (yamlCompatParsed.a !== 1) {
            throw new Error('yaml-compat parse() failed: ' + JSON.stringify(yamlCompatParsed));
          }

          // `lightning-yaml/js-yaml` compat subpath (ESM).
          const jsYamlLoaded = jsYamlLoad('a: 1');
          if (jsYamlLoaded.a !== 1) {
            throw new Error('js-yaml-compat load() failed: ' + JSON.stringify(jsYamlLoaded));
          }

          // CDN/IIFE bundle must exist and be non-empty.
          const cdnPath = './dist/lightning-yaml.min.js';
          if (!existsSync(cdnPath)) {
            throw new Error(cdnPath + ' is missing');
          }
          if (statSync(cdnPath).size === 0) {
            throw new Error(cdnPath + ' is empty');
          }

          console.log('ESM + compat subpaths + CDN bundle smoke test passed');
          EOF

          cat > ./.smoke-test.cjs <<'EOF'
          const { parse, stringify } = require('./dist/index.cjs');

          const cjsParsed = parse('a: 1');
          if (cjsParsed.a !== 1) {
            throw new Error('CJS parse() failed: ' + JSON.stringify(cjsParsed));
          }
          if (typeof stringify({ a: 1 }) !== 'string') {
            throw new Error('CJS stringify() did not return a string');
          }

          console.log('CJS smoke test passed');
          EOF

          node ./.smoke-test.mjs
          node ./.smoke-test.cjs

          rm -f ./.smoke-test.mjs ./.smoke-test.cjs

  validate-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate committed benchmark samples
        run: pnpm validate:benchmarks

  # A PR that changes published source must declare its version bump. The
  # escape hatch for a src/ change that genuinely ships nothing is an explicit
  # empty changeset, so "I forgot" and "no release needed" stay distinguishable.
  changeset-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require a changeset when src/ changes
        env:
          BASE: ${{ github.base_ref }}
        run: |
          set -eu
          git fetch origin "$BASE"
          changed=$(git diff --name-only "origin/$BASE...HEAD")
          src_changed=$(echo "$changed" | grep -E '^src/' || true)
          changeset_added=$(echo "$changed" | grep -E '^\.changeset/.+\.md$' | grep -vE '^\.changeset/README\.md$' || true)
          if [ -n "$src_changed" ] && [ -z "$changeset_added" ]; then
            echo "::error::This PR changes src/ but adds no changeset. Run 'pnpm changeset' to declare the bump (patch/minor/major), or 'pnpm changeset add --empty' if it genuinely needs no release."
            exit 1
          fi
          echo "Changeset check passed."

name: Bug report
description: A parse/stringify result that looks wrong, a crash, or a hang.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing! For a parser, a **minimal reproducing input** is worth
        more than any description — please fill in the YAML and the two outputs.

        If this is a **security** issue (a way to crash, hang, or pollute a
        prototype from untrusted input), please **don't** file it here — see
        [SECURITY.md](../blob/main/SECURITY.md) for private reporting.
  - type: textarea
    id: input
    attributes:
      label: Input
      description: The exact YAML (or the exact `stringify` value) that triggers it.
      render: yaml
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What you expected to get back (value, or thrown error).
    validations:
      required: false
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What actually happened — the returned value, the error/stack, or "hangs".
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: lightning-yaml version
      placeholder: e.g. 0.1.0
    validations:
      required: false
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: e.g. Node 20.11, Deno 2.1, Bun 1.1, Chrome 130
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Anything else
      description: How another parser (js-yaml / yaml) handles it, links, context — optional.
    validations:
      required: false
